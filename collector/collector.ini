; ======================================================================
; DataCore SANsymphony -> InfluxDB collector configuration
; ======================================================================
;
; The recommended way to edit this file is through the setup UI at
; http://<docker-host>:8088 — fill in the values, click Save, and the
; collector reloads automatically.
;
; Editing the file by hand also works; send SIGHUP to the collector
; container afterwards (`docker compose kill -s SIGHUP collector`) to
; pick up the changes without a full restart.
;
; All values support ${ENV_VAR} expansion if you prefer keeping secrets
; in the .env file at the repo root.
;
; Filter syntax
; -------------
; include_names / exclude_names  -> glob patterns matched against the
;                                   resource Caption / Alias / Name.
; include_counters / exclude_counters
;                                -> glob patterns matched against the
;                                   counter (field) name.
;
; Patterns are case-insensitive shell-style globs:
;   *    any sequence
;   ?    any single character
;   [ab] character class
;
; Empty include list = "everything". Excludes always win over includes.
; A category section with `enabled = false` is skipped entirely.

[datacore]
; REST server (the IIS host running DataCore REST Support).
; Edit through the setup UI at http://<host>:8088 — these are just the
; defaults you see on first launch.
rest_host    = 10.0.0.1
; Server in the SANsymphony group (sent as the `ServerHost` header).
server_host  = 10.0.0.1
username     = administrator
password     = changeme
scheme       = https
verify_tls   = false
timeout      = 30
api_version  =

[influxdb]
url             = http://influxdb:8086
database        = datacore
username        = datacore
password        = changeme
create_database = false
batch_size      = 500
timeout         = 30

[collector]
; How often to poll DataCore (seconds). DataCore's REST cache holds
; metrics for ~30s by default (RequestExpirationTime in Web.config), so
; 30s is a sensible lower bound. Going lower yields the same data points.
interval_seconds = 30

; ======================================================================
; Per-category filters
; ======================================================================
; Comment out (or set enabled = false) any category you do not need.

[servers]
enabled = true

[servergroups]
enabled = true

[pools]
enabled = true
; Example: only keep production pools, drop test ones.
; include_names = Pool*Prod*
; exclude_names = *test*, *lab*

[poolmembers]
enabled = true

[poollogicaldisks]
; This endpoint requires a pool=<id> parameter; the collector iterates
; over the known pools automatically.
enabled = true

[physicaldisks]
enabled = true
; exclude_counters = Pending*

[sharedpools]
enabled = true

[sharedphysicaldisks]
enabled = true

[virtualdisks]
enabled = true
; Example tightening to reduce series cardinality:
; include_counters = Total*, BytesAllocated*, *CacheHits, *CacheMisses
; exclude_names = vdisk-temp-*

[virtualdiskgroups]
enabled = true

[virtuallogicalunits]
enabled = false

[logicaldisks]
enabled = false

[hosts]
enabled = true

[hostgroups]
enabled = true

[scsiports]
enabled = true

[targetdevices]
enabled = false

[targetdomains]
enabled = false

[snapshots]
enabled = false

[snapshotgroups]
enabled = false

[rollbackgroups]
enabled = false
