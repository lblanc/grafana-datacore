; ======================================================================
; DataCore SANsymphony -> InfluxDB collector configuration
; ======================================================================
;
; Every value supports ${ENV_VAR} expansion so secrets can be passed in
; via Docker environment variables instead of being hardcoded here.
;
; Filter syntax
; -------------
; include_names / exclude_names  -> glob patterns matched against the
;                                   resource Caption / Alias / Name.
; include_counters / exclude_counters
;                                -> glob patterns matched against the
;                                   counter (field) name.
;
; Patterns are case-insensitive shell-style globs:
;   *    any sequence
;   ?    any single character
;   [ab] character class
;
; Empty include list = "everything". Excludes always win over includes.
; A category section with `enabled = false` is skipped entirely.

[datacore]
; REST server (the IIS host running DataCore REST Support).
rest_host    = ${DCSREST}
; Server in the SANsymphony group (sent as the `ServerHost` header).
server_host  = ${DCSSVR}
username     = ${DCSUNAME}
password     = ${DCSPWORD}

; Transport: 'http' (port 80) or 'https' (port 443). DataCore REST
; Support installs both by default; pick whichever matches your IIS
; bindings.
scheme       = https

; Set to false to skip TLS certificate verification (typical when the
; REST Support server uses a self-signed certificate). Set to true if
; you have installed a trusted certificate.
verify_tls   = false

; HTTP timeout for each REST call, in seconds.
timeout      = 30

; API version to put in the URL. Some REST Support builds (2.0/2.01)
; require it (e.g. /1.0/servers); others have it removed (1.06 and 2.1+).
; Leaving this empty makes the client probe both: it tries the
; unversioned URL first and falls back to /1.0/ on a 404. If your build
; is known to need it, set 'api_version = 1.0' to avoid the probe and
; cut one HTTP request per cold endpoint.
api_version  =

[influxdb]
url             = ${INFLUX_URL}
database        = ${INFLUX_DB}
username        = ${INFLUX_USER}
password        = ${INFLUX_PASSWORD}
; Set to true only if the InfluxDB user has admin privileges; otherwise
; the database will be created by the InfluxDB container at boot via
; INFLUXDB_DB.
create_database = false
batch_size      = 500
timeout         = 30

[collector]
; How often to poll DataCore (seconds). DataCore's REST cache holds
; metrics for ~30s by default (RequestExpirationTime in Web.config), so
; 30s is a sensible lower bound. Going lower yields the same data points.
interval_seconds = 30

; ======================================================================
; Per-category filters
; ======================================================================
; Comment out (or set enabled = false) any category you do not need.

[servers]
enabled = true

[servergroups]
enabled = true

[pools]
enabled = true
; Example: only keep production pools, drop test ones.
; include_names = Pool*Prod*
; exclude_names = *test*, *lab*

[poolmembers]
enabled = true

[poollogicaldisks]
; This endpoint requires a pool=<id> parameter; the collector iterates
; over the known pools automatically.
enabled = true

[physicaldisks]
enabled = true
; exclude_counters = Pending*

[sharedpools]
enabled = true

[sharedphysicaldisks]
enabled = true

[virtualdisks]
enabled = true
; Example tightening to reduce series cardinality:
; include_counters = Total*, BytesAllocated*, *CacheHits, *CacheMisses
; exclude_names = vdisk-temp-*

[virtualdiskgroups]
enabled = true

[virtuallogicalunits]
enabled = false

[logicaldisks]
enabled = false

[hosts]
enabled = true

[hostgroups]
enabled = true

[scsiports]
enabled = true

[targetdevices]
enabled = false

[targetdomains]
enabled = false

[snapshots]
enabled = false

[snapshotgroups]
enabled = false

[rollbackgroups]
enabled = false
